name: Release

on:
  workflow_dispatch:
    inputs:
      tag_suffix:
        description: "Optional suffix appended to the Docker image tag (e.g. -oss). Leave empty for no suffix."
        required: false
        default: ""

jobs:
  main:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v3
        with:
          java-version: 21
          distribution: adopt

      - name: Setup node
        uses: actions/setup-node@v3
        with:
          node-version: "22.x"

      - name: Get version from latest tag
        id: version
        run: echo "VERSION=$(git describe --tags --abbrev=0)${{ github.event.inputs.tag_suffix }}" >> $GITHUB_OUTPUT

      - name: BootJar with version
        run: ./gradlew bootJar
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}

      - name: Login to docker
        run: docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p "${{ secrets.DOCKERHUB_PASSWORD }}"

      - name: Create docker image
        run: |
          docker buildx create --use
          ./gradlew dockerPublish
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          DOCKER_IMAGE: ${{ vars.DOCKER_IMAGE }}

      - name: Pack with webapp
        run: ./gradlew packResources
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
